# IIEVI local development stack.
# Start with:  make up   (which runs: doppler run -- podman compose up)
#
# Port assignments (also documented in CONTRIBUTING.md):
#   API       8000
#   PostgreSQL 5432
#   Redis      6379
#   Flower     5555 (bound to 127.0.0.1 only)

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: iievi
      POSTGRES_PASSWORD: iievi
      POSTGRES_DB: iievi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # RLS bootstrap runs on first startup — every dev DB is RLS-enabled from day one
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iievi -d iievi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Connects as iievi_app (NOBYPASSRLS) so local behaviour matches production RLS.
      # Migrations run as the owner role: make migrate (uses Doppler DATABASE_URL_OWNER).
      DATABASE_URL: postgresql+asyncpg://iievi_app:iievi_app_dev_only@postgres:5432/iievi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      HEALTH_API_KEY: ${HEALTH_API_KEY}
      DOCS_KEY: ${DOCS_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-local-dev}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/srv/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    command:
      [
        "celery", "-A", "app.worker.celery_app:celery_app", "worker",
        "--loglevel=INFO", "--concurrency=4",
        "-Q", "ai_conversations,post_publishing,creative_generation,lead_outreach,ad_management,usage_tracking",
      ]
    # Warm shutdown: let the current task finish before the container dies
    stop_grace_period: 300s
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Connects as iievi_app (NOBYPASSRLS) so local behaviour matches production RLS.
      # Migrations run as the owner role: make migrate (uses Doppler DATABASE_URL_OWNER).
      DATABASE_URL: postgresql+asyncpg://iievi_app:iievi_app_dev_only@postgres:5432/iievi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      HEALTH_API_KEY: ${HEALTH_API_KEY}
      DOCS_KEY: ${DOCS_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./apps/api:/srv/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
    command:
      ["celery", "-A", "app.worker.celery_app:celery_app", "beat", "--loglevel=INFO"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Connects as iievi_app (NOBYPASSRLS) so local behaviour matches production RLS.
      # Migrations run as the owner role: make migrate (uses Doppler DATABASE_URL_OWNER).
      DATABASE_URL: postgresql+asyncpg://iievi_app:iievi_app_dev_only@postgres:5432/iievi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      HEALTH_API_KEY: ${HEALTH_API_KEY}
      DOCS_KEY: ${DOCS_KEY}
    volumes:
      - ./apps/api:/srv/api
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./apps/api
    command:
      ["celery", "-A", "app.worker.celery_app:celery_app", "flower", "--port=5555"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Connects as iievi_app (NOBYPASSRLS) so local behaviour matches production RLS.
      # Migrations run as the owner role: make migrate (uses Doppler DATABASE_URL_OWNER).
      DATABASE_URL: postgresql+asyncpg://iievi_app:iievi_app_dev_only@postgres:5432/iievi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      HEALTH_API_KEY: ${HEALTH_API_KEY}
      DOCS_KEY: ${DOCS_KEY}
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
