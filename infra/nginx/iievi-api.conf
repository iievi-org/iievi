# IIEVI API reverse proxy — /etc/nginx/sites-available/iievi-api.conf
# Symlink into sites-enabled and `nginx -t && systemctl reload nginx`.
# Replace api.iievi.example with the production API domain before deploying.
# certbot --nginx will append the ssl_certificate directives on first run.

# HTTP: redirect everything to HTTPS (certbot also uses this for renewal).
server {
    listen 80;
    listen [::]:80;
    server_name api.iievi.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: proxy to FastAPI (Gunicorn/Uvicorn on localhost:8000).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.iievi.example;

    # --- TLS (managed by certbot --nginx) ---------------------------------
    ssl_certificate     /etc/letsencrypt/live/api.iievi.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.iievi.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- Security headers on every response --------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CORS responses vary by requesting origin — never cache across origins.
    add_header Vary "Origin" always;

    # --- Compression --------------------------------------------------------
    gzip on;
    gzip_min_length 1024;
    gzip_types application/json text/html text/css application/javascript text/javascript;
    gzip_vary on;

    # --- Limits -------------------------------------------------------------
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Accurate client information for FastAPI (rate limiting, audit logs)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Host $host;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Webhooks and AI endpoints must never be buffered to disk
        proxy_buffering off;
    }

    # Uptime Robot polls /health every 5 min; allow short edge caching.
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=30" always;
    }
}
