{% extends "_base.html" %}
{% block content %}
<p style="font-family:Arial,Helvetica,sans-serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#8a857c; margin:0 0 10px;">Published</p>
<h1 style="font-family:Georgia,'Times New Roman',serif; font-size:26px; line-height:1.25; color:#111111; font-weight:normal; margin:0 0 16px;">Your post is live on {{ platform }}</h1>
<p style="font-family:Georgia,'Times New Roman',serif; font-size:16px; line-height:1.55; color:#3a3733; margin:0 0 24px;">The post for {{ business_name }} went out successfully. New enquiries will flow straight into your inbox, and your AI assistant will start the conversation.</p>
<p style="margin:0;"><a href="{{ post_url }}" style="display:inline-block; padding:13px 22px; background:#111111; color:#f7f4ec; text-decoration:none; font-family:Arial,Helvetica,sans-serif; font-size:12px; letter-spacing:0.14em; text-transform:uppercase;">View the post</a></p>
{% endblock %}
